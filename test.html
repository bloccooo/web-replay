<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <style>
            html,
            body {
                margin: 0;
                padding: 0;
            }

            .grid {
                box-sizing: border-box;
                padding: 1rem;
                width: 100%;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }

            .cell {
                width: 100%;
                aspect-ratio: 1;
                border: solid 1px black;
                box-sizing: border-box;
                position: relative;
                overflow: hidden;
            }

            @keyframes circle-css-animation {
                0% {
                    width: 50px;
                    height: 50px;
                }

                50% {
                    width: 100%;
                    height: 100%;
                }

                100% {
                    width: 50px;
                    height: 50px;
                }
            }

            @keyframes small-circle-css-animation {
                0% {
                    border-radius: 0%;
                    background-color: lightsalmon;
                }

                50% {
                    border-radius: 50%;
                    background-color: lightseagreen;
                }

                100% {
                    border-radius: 0%;
                    background-color: lightsalmon;
                }
            }

            .circle-css-animation {
                position: absolute;
                top: 50%;
                left: 50%;
                display: block;
                width: 100px;
                height: 100px;
                animation: circle-css-animation 2s forwards infinite;
                transform: translate(-50%, -50%);
                background-color: black;
                border-radius: 50%;
                overflow: hidden;
            }

            .rect-css-transition {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 200px;
                height: 200px;
                transform: translate(-50%, -50%);
                background-color: red;
                transition: all 1s ease-in-out;
            }

            .rect-css-transition:hover {
                width: 100%;
                background-color: lightgreen;
                transform: translate(-50%, -50%) rotate(90deg);
            }

            .rect-request-animation {
                position: absolute;
                top: 50%;
                left: 0;
                width: 50%;
                height: 50%;
                background-color: blue;
                transform: translate(0, -50%);
            }

            .canvas-animation {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .interval-animation {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 20%;
                height: 20%;
                transform: translate(-50%, -50%);
                background-color: yellow;
                transition: all 1s ease-in-out;
            }

            .small-circles-grid {
                display: flex;
                flex-wrap: wrap;
                width: 100%;
                height: 100%;
            }

            .small-circle-css-animation {
                width: 25%;
                height: 25%;
                background-color: lightsalmon;
                animation: small-circle-css-animation 3s forwards infinite;
            }

            .small-circle-css-animation:nth-child(1) {
                animation-delay: 0s;
            }

            .small-circle-css-animation:nth-child(2) {
                animation-delay: 0.1s;
            }

            .small-circle-css-animation:nth-child(3) {
                animation-delay: 0.2s;
            }

            .small-circle-css-animation:nth-child(4) {
                animation-delay: 0.3s;
            }

            .small-circle-css-animation:nth-child(5) {
                animation-delay: 0.4s;
            }

            .small-circle-css-animation:nth-child(6) {
                animation-delay: 0.5s;
            }

            .small-circle-css-animation:nth-child(7) {
                animation-delay: 0.6s;
            }

            .small-circle-css-animation:nth-child(8) {
                animation-delay: 0.7s;
            }

            .small-circle-css-animation:nth-child(9) {
                animation-delay: 0.8s;
            }

            .small-circle-css-animation:nth-child(10) {
                animation-delay: 0.9s;
            }

            .small-circle-css-animation:nth-child(11) {
                animation-delay: 1s;
            }

            .small-circle-css-animation:nth-child(12) {
                animation-delay: 1.1s;
            }

            .small-circle-css-animation:nth-child(13) {
                animation-delay: 1.2s;
            }

            .small-circle-css-animation:nth-child(14) {
                animation-delay: 1.3s;
            }

            .small-circle-css-animation:nth-child(15) {
                animation-delay: 1.4s;
            }

            .small-circle-css-animation:nth-child(16) {
                animation-delay: 1.5s;
            }

            input {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .caret {
                position: fixed;
                height: 1rem;
                width: 3px;
                background-color: black;
            }
        </style>
    </head>
    <body>
        <div class="rect-anim"></div>

        <div class="grid">
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="rect-css-transition"></div>
            </div>
            <div class="cell">
                <div class="rect-request-animation"></div>
            </div>
            <div class="cell">
                <canvas class="canvas-animation"></canvas>
            </div>
            <div class="cell">
                <div class="interval-animation"></div>
            </div>
            <div class="cell">
                <div class="small-circles-grid">
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                    <div class="small-circle-css-animation"></div>
                </div>
            </div>
            <div class="cell">
                <div class="timeout-animation"></div>
            </div>
            <div class="cell">
                <input type="email" />
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>
            <div class="cell">
                <div class="circle-css-animation"></div>
            </div>

            <div class="caret"></div>
        </div>

        <script>
            const now = Date.now();
            const rectRequestAnimation = document.querySelector(
                ".rect-request-animation",
            );

            function animateRectRequestAnimation() {
                const elapsed = (Date.now() - now) * 0.002;
                rectRequestAnimation.style.transform = `translate(${Math.sin(elapsed) * 50 + 50}%, -50%) rotate(${Math.sin(elapsed) * 90}deg)`;
                requestAnimationFrame(() => animateRectRequestAnimation());
            }

            animateRectRequestAnimation();

            const canvas = document.querySelector(".canvas-animation");

            const canvasBox = canvas.getBoundingClientRect();
            canvas.width = canvasBox.width;
            canvas.height = canvasBox.height;
            const ctx = canvas.getContext("2d");

            const count = 40;
            let x = canvasBox.width * 0.5;
            let y = canvasBox.height * 0.5;

            let ty = 0;
            let tx = 0;

            window.addEventListener("mousemove", (event) => {
                const canvasBox = canvas.getBoundingClientRect();
                tx = Math.min(
                    canvasBox.width + canvasBox.left,
                    Math.max(0, event.clientX - canvasBox.left),
                );
                ty = Math.min(
                    canvasBox.bottom,
                    Math.max(0, event.clientY - canvasBox.top),
                );
            });

            function animateCanvas() {
                if (document.activeElement) {
                    if (
                        document.activeElement.tagName === "INPUT" ||
                        document.activeElement.tagName === "TEXTAREA"
                    ) {
                        const start = document.activeElement.selectionStart;

                        // Create an invisible overlay div mirroring the input's styles
                        const mirror = document.createElement("div");
                        const styles = window.getComputedStyle(
                            document.activeElement,
                        );

                        for (const prop of styles) {
                            mirror.style[prop] = styles[prop];
                        }

                        const inputRect =
                            document.activeElement.getBoundingClientRect();
                        mirror.style.position = "fixed";
                        mirror.style.top = `${inputRect.top}px`;
                        mirror.style.left = `${inputRect.left}px`;
                        mirror.style.width = `${inputRect.width}px`;
                        mirror.style.height = `${inputRect.height}px`;
                        mirror.style.transform = "none";
                        mirror.style.visibility = "hidden";
                        mirror.style.whiteSpace = "pre-wrap";

                        // Fill mirror with text up to caret, then inject a span
                        const textBefore = document.activeElement.value.slice(
                            0,
                            start,
                        );
                        mirror.appendChild(document.createTextNode(textBefore));

                        const caret = document.createElement("span");
                        caret.textContent = "|"; // any character to make it measurable
                        mirror.appendChild(caret);

                        document.body.appendChild(mirror);
                        const rect = caret.getBoundingClientRect();
                        document.body.removeChild(mirror);

                        const caretElement = document.querySelector(".caret");

                        if (caretElement) {
                            caretElement.style.top = `${rect.y}px`;
                            caretElement.style.left = `${rect.x}px`;
                        }

                        console.log(rect);

                        // return {
                        //     element: el,
                        //     caretPos: el.selectionStart,
                        //     selectionStart: el.selectionStart,
                        //     selectionEnd: el.selectionEnd,
                        //     selectedText: el.value.slice(
                        //         el.selectionStart,
                        //         el.selectionEnd,
                        //     ),
                        // };
                    }
                }

                const elapsed = (Date.now() - now) * 0.002;

                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvasBox.width, canvasBox.height);

                for (let i = 0; i < count; i++) {
                    ctx.beginPath();
                    ctx.arc(
                        canvasBox.width * 0.5 +
                            (x - canvasBox.width * 0.5) * ((count - i) / count),
                        canvasBox.height * 0.5 +
                            (y - canvasBox.height * 0.5) *
                                ((count - i) / count),
                        (canvas.width / count / 2) * i,
                        0,
                        Math.PI * 2,
                    );
                    ctx.closePath();
                    ctx.stroke();
                }

                x += (tx - x) * 0.1;
                y += (ty - y) * 0.1;

                requestAnimationFrame(animateCanvas);
            }

            animateCanvas();

            const intervalAnimationElement = document.querySelector(
                ".interval-animation",
            );
            let intervalSwitch = true;
            setInterval(() => {
                if (intervalSwitch) {
                    intervalAnimationElement.style.width = "80%";
                    intervalAnimationElement.style.height = "80%";
                    intervalAnimationElement.style.borderRadius = "50%";
                    intervalAnimationElement.style.backgroundColor = "cyan";
                } else {
                    intervalAnimationElement.style.width = "20%";
                    intervalAnimationElement.style.height = "20%";
                    intervalAnimationElement.style.borderRadius = "0%";
                    intervalAnimationElement.style.backgroundColor = "yellow";
                }

                intervalSwitch = !intervalSwitch;
            }, 2000);
        </script>
    </body>
</html>
