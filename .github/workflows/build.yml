name: Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64   src/index.ts --outfile dist/wsr-linux-x64
          bun build --compile --target=bun-darwin-x64  src/index.ts --outfile dist/wsr-macos-x64
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile dist/wsr-macos-arm64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/wsr-linux-x64 \
            dist/wsr-macos-x64 \
            dist/wsr-macos-arm64
